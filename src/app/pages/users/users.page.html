<div class="home-container px-4 mt-4">
  <div class="ubq-bg-white">
    <div class="header-container">
      <div class="info">
        <h1 class="ubuntu-heading">
          {{ translationService.translate('MENU.ADMINISTRATION.USERS') }}
        </h1>
        <h6 style="color: var(--ubq-neutral-variant-70)" class="mt-2">
          {{ 'Here you can create or update users.' | translate }}
        </h6>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-2 mt-2">
      <button class="button-secondary" mat-fab extended>
        <mat-icon>download</mat-icon>
        Export
      </button>

      <button class="button-primary" mat-fab extended (click)="navigateToUpsert()">
        <mat-icon>add</mat-icon>
        Add
      </button>
    </div>

    <!-- Filter -->
    <div class="flex justify-start gap-2 mt-8">
      <mat-form-field class="filter-input">
        <mat-label>Filter</mat-label>
        <input matInput placeholder="Type to filter" />
      </mat-form-field>

      <button class="button-secondary filter-button" matFab extended>
        <mat-icon>filter_alt</mat-icon>
      </button>
    </div>

    <!-- Table -->
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)"
      class="mat-elevation-z1 full-width-table mt-4">
      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          First Name
        </th>
        <td mat-cell *matCellDef="let user">
          {{ user.name }}
        </td>
      </ng-container>

      <!-- Last Name -->
      <ng-container matColumnDef="surname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Last Name
        </th>
        <td mat-cell *matCellDef="let user">
          {{ user.surname }}
        </td>
      </ng-container>

      <!-- Username -->
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Username
        </th>
        <td mat-cell *matCellDef="let user">
          {{ user.username }}
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Email
        </th>
        <td mat-cell *matCellDef="let user">
          {{ user.email }}
        </td>
      </ng-container>

      <!-- Roles -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Roles
        </th>
        <td mat-cell *matCellDef="let user">
          {{ user.role.join(', ') }}
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <div class="flex gap-2">
            <button mat-icon-button aria-label="View user" (click)="navigateToUpsert(user.id)">
              <mat-icon style="color: var(--account-card-icon);">visibility</mat-icon>
            </button>

            <button mat-icon-button color="warn" aria-label="Delete user" (click)="deleteUser(user.id)">
              <mat-icon style="color: var(--red-chip-text);">delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" [ngClass]="{ 'current-user-row': isCurrentUser(row) }"></tr>
    </table>

    <!-- Paginator -->
    <mat-paginator [length]="totalUsers" [pageIndex]="pageIndex" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons (page)="onPageChange($event)">
    </mat-paginator>
  </div>
</div>
