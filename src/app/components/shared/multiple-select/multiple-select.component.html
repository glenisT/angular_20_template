<mat-form-field appearance="outline" color="warn" class="w-full" [class.field-valid]="control.valid && control.touched"
  [class.field-invalid]="control.invalid && control.touched">
  <mat-select class="custom-select" fullWidth [multiple]="multiple" [formControl]="control" [placeholder]="placeholder"
    (selectionChange)="onSelectionChange()">
    @for (option of options; track option.id ?? option.name) {
    <mat-option [value]="option.id ?? option.name">
      {{ option.label ?? option.name }}
    </mat-option>
    }
  </mat-select>

  <!-- Error message (shown only after touch) -->
  @if (control.touched && control.hasError('required')) {
  <mat-error>
    {{ 'VALIDATION.SELECT_REQUIRED' | translate }}
  </mat-error>
  }
</mat-form-field>
